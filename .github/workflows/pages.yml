name: Deploy GitHub Pages

on:
  workflow_dispatch:
  schedule:
    # 工作日 8:00-20:00 北京时间（即 UTC 0:00-12:00）每小时抓取
    - cron: "0 0-12 * * 1-5"
    # 工作日夜间 + 周末：每 4 小时抓取一次
    - cron: "0 */4 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 恢复上次生成的 live.json，供降级兜底使用
      - name: Restore previous data
        uses: actions/cache@v4
        with:
          path: public/data/live.json
          key: live-json-${{ github.run_id }}
          restore-keys: live-json-

      - name: Generate data
        run: node scripts/fetch-news.mjs

      # 将本次生成结果写入缓存，供下次降级使用
      - name: Save data to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: public/data/live.json
          key: live-json-${{ github.run_id }}

      - name: Validate
        run: npm run validate

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
